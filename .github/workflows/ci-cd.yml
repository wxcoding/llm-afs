name: CI/CD 自动化部署流程

on:
  push:
    branches: [main, master]
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        type: choice
        options:
          - dev
          - test
          - prod
        default: 'prod'
        required: true

env:
  # 项目配置
  APP_NAME: llm-afs
  JAVA_VERSION: '17'
  NODE_VERSION: '18'
  
  # Docker配置 - 阿里云容器镜像服务
  REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
  IMAGE_NAME_SERVER: ${{ secrets.ALIYUN_ACR_NAMESPACE }}/afs-server
  IMAGE_NAME_WEB: ${{ secrets.ALIYUN_ACR_NAMESPACE }}/afs-web
  
  # 环境变量
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres123
  POSTGRES_DB: afs
  AI_DASHSCOPE_MODEL: qwen-turbo

jobs:
  # ==================== 构建阶段 ====================
  build:
    name: 构建应用
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 构建后端
      - name: 配置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 构建 Spring Boot 后端
        working-directory: ./afs-server
        run: mvn -B -DskipTests clean package

      # 构建前端
      - name: 配置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: afs-web/package.json

      - name: 安装前端依赖
        working-directory: ./afs-web
        run: npm install

      - name: 构建 Vue 前端
        working-directory: ./afs-web
        run: npm run build

      # 上传构建产物
      - name: 上传后端 JAR 包
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: afs-server/target/*.jar
          retention-days: 1

      - name: 上传前端静态文件
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: afs-web/dist
          retention-days: 1

  # ==================== Docker构建与推送 ====================
  docker-build:
    name: 构建并推送Docker镜像
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 下载构建产物
      - name: 下载后端 JAR 包
        uses: actions/download-artifact@v4
        with:
          name: server-jar
          path: afs-server/target/

      - name: 下载前端静态文件
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: afs-web/dist/

      # Docker配置
      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录阿里云容器镜像服务
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      # 构建后端镜像
      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./afs-server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SERVER }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SERVER }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 构建前端镜像
      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./afs-web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 输出镜像信息
      - name: 输出镜像标签
        run: |
          echo "后端镜像: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SERVER }}:${{ github.sha }}"
          echo "前端镜像: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:${{ github.sha }}"

  # ==================== 部署到服务器 ====================
  deploy:
    name: 部署到生产服务器
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 创建服务器目录
      - name: 创建部署目录
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          script: |
            mkdir -p ${{ secrets.SERVER_PROJECT_PATH }}/${{ env.APP_NAME }}

      # 上传配置文件
      - name: 上传 docker-compose.prod.yml
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          source: docker-compose.prod.yml
          target: ${{ secrets.SERVER_PROJECT_PATH }}/${{ env.APP_NAME }}/

      # 执行部署
      - name: 执行服务器部署
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          timeout: 3600s # 总会话超时：30分钟（全局）
          command_timeout: 3000s # 单条命令超时：20分钟
          script: |
            cd ${{ secrets.SERVER_PROJECT_PATH }}/${{ env.APP_NAME }}

            # 登录阿里云容器镜像服务
            echo "${{ secrets.ALIYUN_ACR_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.ALIYUN_ACR_USERNAME }}" --password-stdin

            # 生成 .env 文件，统一管理所有环境变量
            cat > .env << EOF
            IMAGE_TAG=${{ github.sha }}
            REGISTRY=${{ env.REGISTRY }}
            IMAGE_NAME_SERVER=${{ env.IMAGE_NAME_SERVER }}
            IMAGE_NAME_WEB=${{ env.IMAGE_NAME_WEB }}
            POSTGRES_USER=${{ env.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ env.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ env.POSTGRES_DB }}
            AI_DASHSCOPE_API_KEY=${{ secrets.AI_DASHSCOPE_API_KEY }}
            AI_DASHSCOPE_MODEL=${{ env.AI_DASHSCOPE_MODEL }}
            EOF

            # 拉取最新镜像
            docker compose -f docker-compose.prod.yml pull --timeout 3000

            # 启动服务
            docker compose -f docker-compose.prod.yml up -d

            # 检查服务状态
            sleep 30
            docker compose -f docker-compose.prod.yml ps

            # 清理
            docker image prune -f

            echo "部署成功！"

  # ==================== 通知 ====================
  notify:
    name: 发送部署通知
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 检查部署状态
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "部署成功！"
          else
            echo "部署失败！"
            exit 1
          fi
