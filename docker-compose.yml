services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: afs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: afs
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d afs"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - afs-network

  afs-server:
    build:
      context: ./afs-server
      dockerfile: Dockerfile
    container_name: afs-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/afs?stringtype=unspecified
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      AI_DASHSCOPE_API_KEY: ${AI_DASHSCOPE_API_KEY:-}
      AI_DASHSCOPE_MODEL: ${AI_DASHSCOPE_MODEL:-qwen-turbo}
      JAVA_OPTS: "-Xmx512m -Xms256m"
    ports:
      - "8080:8080"
    volumes:
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - afs-network

  afs-web:
    build:
      context: ./afs-web
      dockerfile: Dockerfile
    container_name: afs-web
    restart: unless-stopped
    depends_on:
      - afs-server
    ports:
      - "3000:80"
    volumes:
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - afs-network

volumes:
  postgres_data:

networks:
  afs-network:
    driver: bridge
