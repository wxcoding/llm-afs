services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: afs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: guanwx
      POSTGRES_DB: afs
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./afs-server/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 12

  afs-server:
    build:
      context: ./afs-server
      dockerfile: Dockerfile
    container_name: afs-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/afs?stringtype=unspecified
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      AI_DASHSCOPE_API_KEY: ${AI_DASHSCOPE_API_KEY:-sk-e3a6931ada6045909dc8db75a839a0ca}
      AI_DASHSCOPE_MODEL: ${AI_DASHSCOPE_MODEL:-qwen-turbo}
    ports:
      - "8080:8080"

  afs-web:
    build:
      context: ./afs-web
      dockerfile: Dockerfile
    container_name: afs-web
    restart: unless-stopped
    depends_on:
      - afs-server
    ports:
      - "3000:80"
