server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/afs?stringtype=unspecified
    username: postgres
    password: guanwx
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m
  ai:
    openai:
      api-key: ${AI_DASHSCOPE_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: ${AI_DASHSCOPE_MODEL:qwen-turbo}
          temperature: 0.7
          max-tokens: 2000
      embedding:
        options:
          model: text-embedding-v3
      # 重试配置
      retry:
        max-attempts: 3              # 最多重试3次
        backoff:
          initial-interval: 2000     # 初始等待2秒
          multiplier: 2              # 指数退避：2s → 4s → 8s
          max-interval: 30000        # 最大等待30秒
      # HTTP客户端超时配置
      client:
        http:
          connect-timeout: 5000      # 连接超时5秒
          read-timeout: 60000        # 读取超时60秒（Embedding可能较慢）
          write-timeout: 30000       # 写入超时30秒
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        initialize-schema: true
        filter: true  # 启用 FilterExpression 支持（Spring AI 1.1.7）
      # 混合检索配置（BM25 + 向量）
      hybrid-search:
        enabled: false  # 是否启用混合检索
        query-expansion: true  # 是否启用查询扩展
        vector-top-k: 20  # 向量检索返回数量
        bm25-top-k: 20  # BM25 检索返回数量
        final-top-k: 5  # 最终返回数量
    # ReRank 重排序配置
    rerank:
      enabled: false  # 是否启用 ReRank
      provider: jina  # Provider: jina / cohere / mock
      top-n: 3  # ReRank 返回的 Top N
      jina:
        endpoint: https://api.jina.ai/v1/rerank
        api-key: ${JINA_API_KEY:}
      cohere:
        endpoint: https://api.cohere.ai/v1/rerank
        api-key: ${COHERE_API_KEY:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true


logging:
  level:
    root: INFO
    com.afs: DEBUG
    org.springframework.ai: WARN
    org.springframework.ai.retry: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
