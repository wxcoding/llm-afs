# AFS 生产环境 Docker Compose 配置
#
# 使用方式:
#   开发环境: docker compose up -d
#   生产环境: docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: afs-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-afs}
      TZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 使用 Flyway 进行数据库迁移，无需单独挂载 schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - afs-network

  afs-server:
    image: ${REGISTRY}/${IMAGE_NAME_SERVER}:${IMAGE_TAG:-latest}
    container_name: afs-server
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-afs}?stringtype=unspecified
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      AI_DASHSCOPE_API_KEY: ${AI_DASHSCOPE_API_KEY}
      AI_DASHSCOPE_MODEL: ${AI_DASHSCOPE_MODEL:-qwen-turbo}
      JAVA_OPTS: ${JAVA_OPTS:--Xmx512m -Xms256m}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - /etc/localtime:/etc/localtime:ro
#      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - afs-network

  afs-web:
    image: ${REGISTRY}/${IMAGE_NAME_WEB}:${IMAGE_TAG:-latest}
    container_name: afs-web
    restart: always
    depends_on:
      - afs-server
    ports:
      - "${WEB_PORT:-3000}:80"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -f http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - afs-network

volumes:
  postgres_data:
    driver: local

networks:
  afs-network:
    driver: bridge